<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Рулетка клипов — Twitch Clip Roulette</title>
  <meta name="description" content="Крути рулетку и открывай случайные Twitch-клипы в стиле CS:GO кейсов!" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- PapaParse for CSV parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <!-- Project Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background glow effects -->
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <!-- Header -->
  <header class="header">
    <div class="header__logo">
      <svg class="header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"></polygon>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
      </svg>
      <h1 class="header__title">Рулетка клипов</h1>
    </div>
    <p class="header__subtitle">Крути и открывай случайные Twitch-клипы</p>
  </header>

  <!-- Main Content -->
  <main class="main">

    <!-- Roulette Section -->
    <section class="roulette-section" id="rouletteSection">
      <div class="roulette-wrapper">
        <!-- Pointer / crosshair -->
        <div class="roulette-pointer"></div>
        <div class="roulette-pointer-glow"></div>

        <!-- Roulette viewport -->
        <div class="roulette-viewport" id="rouletteViewport">
          <div class="roulette-track" id="rouletteTrack">
            <!-- Cards generated by JS -->
          </div>
        </div>

        <!-- Edge fades -->
        <div class="roulette-fade roulette-fade--left"></div>
        <div class="roulette-fade roulette-fade--right"></div>
      </div>

      <!-- Spin button -->
      <button class="spin-btn" id="spinBtn" disabled>
        <span class="spin-btn__icon">&#9881;</span>
        <span class="spin-btn__text">Загрузка клипов...</span>
      </button>

      <!-- Stats bar -->
      <div class="stats-bar" id="statsBar">
        <div class="stats-bar__item">
          <span class="stats-bar__label">Клипов в базе</span>
          <span class="stats-bar__value" id="totalClips">—</span>
        </div>
        <div class="stats-bar__item">
          <span class="stats-bar__label">Прокруток</span>
          <span class="stats-bar__value" id="spinCount">0</span>
        </div>
      </div>
    </section>

    <!-- Player Section -->
    <section class="player-section" id="playerSection">
      <div class="player-container" id="playerContainer">
        <!-- Placeholder before first spin -->
        <div class="player-placeholder" id="playerPlaceholder">
          <svg class="player-placeholder__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          <p class="player-placeholder__text">Крутите рулетку, чтобы открыть клип</p>
        </div>

        <!-- Twitch iframe embed (hidden until spin) -->
        <iframe
          id="twitchEmbed"
          class="player-iframe"
          src=""
          frameborder="0"
          allowfullscreen="true"
          scrolling="no"
          style="display: none;"
        ></iframe>
      </div>

      <!-- Clip metadata -->
      <div class="clip-meta" id="clipMeta" style="display: none;">
        <h2 class="clip-meta__title" id="clipTitle"></h2>
        <div class="clip-meta__author">
          <svg class="clip-meta__author-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span class="clip-meta__author-name" id="clipClipper"></span>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Рулетка клипов. Twitch clips belong to their respective owners.</p>
  </footer>

  <!-- Project Script -->
  <script src="script.js"></script>
</body>
</html>
